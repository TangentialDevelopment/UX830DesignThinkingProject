<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Verifact</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/index.css">
    </head>
    <body>
        <div class="container">
            <h1>Verifact</h1>
            
            <div class="search-section">
                <form id="searchForm" class="search-form">
                    <input type="text" id="searchInput" placeholder="Search Here" class="search-input">
                    <button type="submit" class="search-btn">Search</button>
                </form>
            </div>
            
            <div class="add-section">
                <a href="pages/addClaim.html" class="add-btn">
                    Add Claim
                </a>
            </div>
        </div>

        <script src="js/storage.js"></script>
        <script>
            document.getElementById('searchForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const query = document.getElementById('searchInput').value.trim();
                if (query) {
                    window.location.href = `pages/searchResults.html?q=${encodeURIComponent(query)}`;
                } else {
                    window.location.href = 'pages/searchResults.html';
                }
            });

            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('searchForm').dispatchEvent(new Event('submit'));
                }
            });

            document.getElementById('searchInput').focus();
        </script>
    </body>
</html>
