<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Claim Detail - Verifact</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/index.css">
        <link rel="stylesheet" href="../css/claimDetail.css">
    </head>
    <body>
        <div class="container">
            <div class="top-bar">
                <a href="searchResults.html" class="back-btn">
                    Back
                </a>
            </div>

            <div id="claimContent">
                <div id="loadingMessage" class="loading-message">Loading claim...</div>
            </div>
        </div>

        <script src="../js/storage.js"></script>
        <script>
            var urlParams = new URLSearchParams(window.location.search);
            var claimId = urlParams.get('id');

            document.addEventListener('DOMContentLoaded', function() {
                if (claimId) {
                    loadClaim(claimId);
                } else {
                    document.getElementById('claimContent').innerHTML = '<p class="error">No claim ID provided.</p>';
                }
            });

            function loadClaim(id) {
                try {
                    var claim = getClaimById(id);
                    
                    if (!claim) {
                        document.getElementById('claimContent').innerHTML = '<p class="error">Claim not found.</p>';
                        return;
                    }

                    displayClaim(claim);
                } catch (error) {
                    console.error('Error loading claim:', error);
                    document.getElementById('claimContent').innerHTML = '<p class="error">Error loading claim.</p>';
                }
            }

            function displayClaim(claim) {
                var container = document.getElementById('claimContent');
                
                var sources = getSourcesForClaim(claim.id);
                var allSources = [];
                
                if (claim.source) {
                    allSources.push({
                        id: 'initial_source_' + claim.id,
                        link: claim.source,
                        count: '0',
                        count2: '0',
                        isInitial: true
                    });
                }
                
                if (sources && sources.length > 0) {
                    for (var i = 0; i < sources.length; i++) {
                        sources[i].isInitial = false;
                        allSources.push(sources[i]);
                    }
                }
                
                var sourcesHtml = '';
                if (allSources && allSources.length > 0) {
                    sourcesHtml = allSources.map(function(source, index) {
                        var comments = [];
                        if (!source.isInitial) {
                            comments = getCommentsForSource(source.id);
                        }
                        var sourceLabel = source.isInitial ? 'Initial Source' : 'Source ' + (allSources.filter(function(s) { return !s.isInitial; }).indexOf(source) + 1);
                        var sourceId = source.id || 'initial_' + index;
                        
                        var commentsHtml = '';
                        if (source.isInitial) {
                            commentsHtml = '<p class="no-comments">Comments not available for initial source.</p>';
                        } else {
                            commentsHtml = '';
                            if (comments && comments.length > 0) {
                                for (var c = 0; c < comments.length; c++) {
                                    commentsHtml += '<div class="comment-item">';
                                    commentsHtml += '<span class="comment-text">' + escapeHtml(comments[c].text) + '</span>';
                                    commentsHtml += '<button onclick="deleteComment(\'' + comments[c].id + '\')" class="delete-comment-btn">x</button>';
                                    commentsHtml += '</div>';
                                }
                            } else {
                                commentsHtml = '<p class="no-comments">No comments yet.</p>';
                            }
                        }
                        
                        return '<div class="source-section" data-source-index="' + index + '">' +
                            '<div class="source-header">' +
                                '<span class="source-label">' + sourceLabel + '</span>' +
                            '</div>' +
                            '<div class="source-content">' +
                                '<div class="source-row">' +
                                    '<span class="source-field-label">Link</span>' +
                                    '<a href="' + (source.link || '#') + '" class="source-link" target="_blank">' + (source.link || 'No link') + '</a>' +
                                '</div>' +
                                '<div class="source-row count-row">' +
                                    '<span class="source-field-label">Count</span>' +
                                    '<div class="count-control">' +
                                        '<button onclick="updateCount(\'' + claim.id + '\', \'' + sourceId + '\', \'count\', -1, ' + source.isInitial + ')" class="count-btn">-</button>' +
                                        '<span class="source-count" id="count-' + sourceId + '">' + (source.count || '0') + '</span>' +
                                        '<button onclick="updateCount(\'' + claim.id + '\', \'' + sourceId + '\', \'count\', 1, ' + source.isInitial + ')" class="count-btn">+</button>' +
                                    '</div>' +
                                '</div>' +
                                '<div class="source-row count-row">' +
                                    '<span class="source-field-label">Count</span>' +
                                    '<div class="count-control">' +
                                        '<button onclick="updateCount(\'' + claim.id + '\', \'' + sourceId + '\', \'count2\', -1, ' + source.isInitial + ')" class="count-btn">-</button>' +
                                        '<span class="source-count" id="count2-' + sourceId + '">' + (source.count2 || '0') + '</span>' +
                                        '<button onclick="updateCount(\'' + claim.id + '\', \'' + sourceId + '\', \'count2\', 1, ' + source.isInitial + ')" class="count-btn">+</button>' +
                                    '</div>' +
                                '</div>' +
                                '<div class="comment-section">' +
                                    '<div class="comment-header">' +
                                        '<span class="comment-label">Comment section by source</span>' +
                                    '</div>' +
                                    '<div class="comments">' +
                                        commentsHtml +
                                    '</div>' +
                                    (source.isInitial ? '' : '<div class="add-comment">' +
                                        '<input type="text" class="comment-input" placeholder="Add comment" id="comment-input-' + sourceId + '">' +
                                        '<button onclick="addComment(\'' + claim.id + '\', \'' + sourceId + '\')" class="add-comment-btn">Add comment</button>' +
                                    '</div>') +
                                '</div>' +
                            '</div>' +
                        '</div>';
                    }).join('');
                }

                container.innerHTML = '<div class="claim-detail">' +
                    '<div class="claim-header">' +
                        '<h1 class="claim-title">' + escapeHtml(claim.claim || claim.text || 'No claim text') + '</h1>' +
                    '</div>' +
                    '<div class="claim-meta">' +
                        '<span class="meta-item">Created: ' + new Date(claim.createdAt).toLocaleString() + '</span>' +
                        (claim.updatedAt && claim.updatedAt !== claim.createdAt ? 
                            '<span class="meta-item">Updated: ' + new Date(claim.updatedAt).toLocaleString() + '</span>' : ''
                        ) +
                    '</div>' +
                    '<div class="sources-container">' +
                        '<h2 class="sources-title">Sources</h2>' +
                        (sourcesHtml || '<p class="no-sources-text">No sources added yet.</p>') +
                    '</div>' +
                    '<div class="add-source-section-bottom">' +
                        '<a href="addSource.html?id=' + claim.id + '" class="add-source-btn-bottom">Add Source</a>' +
                    '</div>' +
                '</div>';
            }

            function updateCount(claimId, sourceId, field, change, isInitial) {
                try {
                    if (isInitial) {
                        var claim = getClaimById(claimId);
                        if (!claim) return;
                        
                        var currentValue = parseInt(claim[field]) || 0;
                        var newValue = currentValue + change;
                        if (newValue < 0) newValue = 0;
                        
                        var updates = {};
                        updates[field] = newValue.toString();
                        updateClaim(claimId, updates);
                        
                        var countElement = document.getElementById(field + '-' + sourceId);
                        if (countElement) {
                            countElement.textContent = newValue;
                        }
                    } else {
                        var sources = getSourcesForClaim(claimId);
                        var source = sources.find(function(s) { return s.id === sourceId; });
                        if (!source) return;
                        
                        var currentValue = parseInt(source[field]) || 0;
                        var newValue = currentValue + change;
                        if (newValue < 0) newValue = 0;
                        
                        source[field] = newValue.toString();
                        updateSource(sourceId, { [field]: newValue.toString() });
                        
                        var countElement = document.getElementById(field + '-' + sourceId);
                        if (countElement) {
                            countElement.textContent = newValue;
                        }
                    }
                } catch (error) {
                    console.error('Error updating count:', error);
                    alert('Error updating count.');
                }
            }

            function addComment(claimId, sourceId) {
                var input = document.getElementById('comment-input-' + sourceId);
                var text = input.value.trim();
                
                if (!text) {
                    alert('Please enter a comment.');
                    return;
                }

                try {
                    addComment(claimId, sourceId, text);
                    input.value = '';
                    loadClaim(claimId);
                } catch (error) {
                    console.error('Error adding comment:', error);
                    alert('Error adding comment.');
                }
            }

            function deleteComment(commentId) {
                if (!confirm('Delete this comment?')) {
                    return;
                }

                try {
                    deleteComment(commentId);
                    loadClaim(claimId);
                } catch (error) {
                    console.error('Error deleting comment:', error);
                    alert('Error deleting comment.');
                }
            }

            function escapeHtml(text) {
                if (!text) return '';
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        </script>
    </body>
</html>
