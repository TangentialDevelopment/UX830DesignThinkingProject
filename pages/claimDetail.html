<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Claim Detail - Verifact</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/claimDetail.css">
    </head>
    <body>
        <div class="container">
            <div class="top-bar">
                <a href="searchResults.html" class="back-btn">
                    Back
                </a>
            </div>

            <div id="claimContent">
                <div id="loadingMessage" class="loading-message">Loading claim...</div>
            </div>
        </div>

        <script src="../js/storage.js"></script>
        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const claimId = urlParams.get('id');

            document.addEventListener('DOMContentLoaded', function() {
                if (claimId) {
                    loadClaim(claimId);
                } else {
                    document.getElementById('claimContent').innerHTML = '<p class="error">No claim ID provided.</p>';
                }
            });

            function loadClaim(id) {
                try {
                    const claim = getClaimById(id);
                    
                    if (!claim) {
                        document.getElementById('claimContent').innerHTML = '<p class="error">Claim not found.</p>';
                        return;
                    }

                    displayClaim(claim);
                } catch (error) {
                    console.error('Error loading claim:', error);
                    document.getElementById('claimContent').innerHTML = '<p class="error">Error loading claim.</p>';
                }
            }

            function displayClaim(claim) {
                const container = document.getElementById('claimContent');
                
                const sources = getSourcesForClaim(claim.id);
                
                let sourcesHtml = '';
                if (sources && sources.length > 0) {
                    sourcesHtml = sources.map((source, index) => {
                        const comments = getCommentsForSource(source.id);
                        return `
                            <div class="source-section" data-source-index="${index}">
                                <div class="source-header">
                                    <span class="source-label">Source ${index + 1}</span>
                                </div>
                                <div class="source-content">
                                    <div class="source-row">
                                        <span class="source-field-label">Link</span>
                                        <a href="${source.link || '#'}" class="source-link" target="_blank">${source.link || 'No link'}</a>
                                    </div>
                                    <div class="source-row count-row">
                                        <span class="source-field-label">Count</span>
                                        <div class="count-control">
                                            <button onclick="updateCount('${claim.id}', '${source.id}', 'count', -1)" class="count-btn">-</button>
                                            <span class="source-count" id="count-${source.id}">${source.count || '0'}</span>
                                            <button onclick="updateCount('${claim.id}', '${source.id}', 'count', 1)" class="count-btn">+</button>
                                        </div>
                                    </div>
                                    <div class="source-row count-row">
                                        <span class="source-field-label">Count</span>
                                        <div class="count-control">
                                            <button onclick="updateCount('${claim.id}', '${source.id}', 'count2', -1)" class="count-btn">-</button>
                                            <span class="source-count" id="count2-${source.id}">${source.count2 || '0'}</span>
                                            <button onclick="updateCount('${claim.id}', '${source.id}', 'count2', 1)" class="count-btn">+</button>
                                        </div>
                                    </div>
                                    <div class="comment-section">
                                        <div class="comment-header">
                                            <span class="comment-label">Comment section by source</span>
                                        </div>
                                        <div class="comments">
                                            ${comments && comments.length > 0 ? 
                                                comments.map(comment => `
                                                    <div class="comment-item">
                                                        <span class="comment-text">${escapeHtml(comment.text)}</span>
                                                        <button onclick="deleteComment('${comment.id}')" class="delete-comment-btn">×</button>
                                                    </div>
                                                `).join('') : 
                                                '<p class="no-comments">No comments yet.</p>'
                                            }
                                        </div>
                                        <div class="add-comment">
                                            <input type="text" class="comment-input" placeholder="Add comment" id="comment-input-${source.id}">
                                            <button onclick="addComment('${claim.id}', '${source.id}')" class="add-comment-btn">Add comment</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                container.innerHTML = `
                    <div class="claim-detail">
                        <div class="claim-header">
                            <h1 class="claim-title">${escapeHtml(claim.claim || claim.text || 'No claim text')}</h1>
                        </div>
                        
                        <div class="claim-meta">
                            <span class="meta-item">Created: ${new Date(claim.createdAt).toLocaleString()}</span>
                            ${claim.updatedAt && claim.updatedAt !== claim.createdAt ? 
                                `<span class="meta-item">Updated: ${new Date(claim.updatedAt).toLocaleString()}</span>` : ''
                            }
                        </div>

                        <div class="sources-container">
                            <h2 class="sources-title">Sources</h2>
                            ${sourcesHtml || '<p class="no-sources-text">No sources added yet.</p>'}
                        </div>

                        <div class="add-source-section-bottom">
                            <a href="addSource.html?id=${claim.id}" class="add-source-btn-bottom">Add Source</a>
                        </div>
                    </div>
                `;
            }

            function updateCount(claimId, sourceId, field, change) {
                try {
                    const source = getSourcesForClaim(claimId).find(s => s.id === sourceId);
                    if (!source) return;
                    
                    let currentValue = parseInt(source[field]) || 0;
                    let newValue = currentValue + change;
                    
                    if (newValue < 0) {
                        newValue = 0;
                    }
                    
                    source[field] = newValue.toString();
                    updateSource(sourceId, { [field]: newValue.toString() });
                    
                    const countElement = document.getElementById(`${field}-${sourceId}`);
                    if (countElement) {
                        countElement.textContent = newValue;
                    }
                } catch (error) {
                    console.error('Error updating count:', error);
                    alert('Error updating count.');
                }
            }

            function addComment(claimId, sourceId) {
                const input = document.getElementById(`comment-input-${sourceId}`);
                const text = input.value.trim();
                
                if (!text) {
                    alert('Please enter a comment.');
                    return;
                }

                try {
                    addComment(claimId, sourceId, text);
                    input.value = '';
                    loadClaim(claimId);
                } catch (error) {
                    console.error('Error adding comment:', error);
                    alert('Error adding comment.');
                }
            }

            function deleteComment(commentId) {
                if (!confirm('Delete this comment?')) {
                    return;
                }

                try {
                    deleteComment(commentId);
                    loadClaim(claimId);
                } catch (error) {
                    console.error('Error deleting comment:', error);
                    alert('Error deleting comment.');
                }
            }

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        </script>
    </body>
</html>
