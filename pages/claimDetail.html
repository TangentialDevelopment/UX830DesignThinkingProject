<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Claim Detail - Verifact</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/index.css">
        <link rel="stylesheet" href="../css/claimDetail.css">
    </head>
    <body>
        <div class="container">
            <div class="top-bar">
                <a href="searchResults.html" class="back-btn">
                    Back
                </a>
            </div>

            <div id="claimContent">
                <div id="loadingMessage" class="loading-message">Loading claim...</div>
            </div>
        </div>

        <script src="../js/storage.js"></script>
        <script>
            var urlParams = new URLSearchParams(window.location.search);
            var claimId = urlParams.get('id');

            document.addEventListener('DOMContentLoaded', function() {
                if (claimId) {
                    loadClaim(claimId);
                } else {
                    document.getElementById('claimContent').innerHTML = '<p class="error">No claim ID provided.</p>';
                }
            });

            function loadClaim(id) {
                try {
                    var claim = getClaimById(id);
                    
                    if (!claim) {
                        document.getElementById('claimContent').innerHTML = '<p class="error">Claim not found.</p>';
                        return;
                    }

                    displayClaim(claim);
                } catch (error) {
                    console.error('Error loading claim:', error);
                    document.getElementById('claimContent').innerHTML = '<p class="error">Error loading claim.</p>';
                }
            }

            function displayClaim(claim) {
                var container = document.getElementById('claimContent');
                
                var sources = getSourcesForClaim(claim.id);
                
                var allSources = [];
                
                if (claim.source) {
                    allSources.push({
                        id: 'initial_' + claim.id,
                        link: claim.source,
                        reliabilityScore: claim.reliabilityScore || '0',
                        comments: claim.comments || [],
                        isInitial: true
                    });
                }
                
                for (var i = 0; i < sources.length; i++) {
                    sources[i].isInitial = false;
                    allSources.push(sources[i]);
                }
                
                var sourcesHtml = '';
                if (allSources && allSources.length > 0) {
                    for (var s = 0; s < allSources.length; s++) {
                        var source = allSources[s];
                        var sourceLabel = source.isInitial ? 'Initial Source' : 'Source ' + s;
                        var sourceId = source.id || 'initial_' + claim.id;
                        
                        var comments = [];
                        if (source.isInitial) {
                            comments = source.comments || [];
                        } else {
                            comments = getCommentsForSource(source.id);
                        }
                        
                        var commentsHtml = '';
                        if (comments && comments.length > 0) {
                            for (var c = 0; c < comments.length; c++) {
                                var commentText = comments[c].text || comments[c];
                                var commentId = comments[c].id || 'comment_' + c;
                                commentsHtml += '<div class="comment-item">';
                                commentsHtml += '<span class="comment-text">' + escapeHtml(commentText) + '</span>';
                                commentsHtml += '<button onclick="deleteComment(\'' + commentId + '\', ' + source.isInitial + ')" class="delete-comment-btn">x</button>';
                                commentsHtml += '</div>';
                            }
                        } else {
                            commentsHtml = '<p class="no-comments">No comments yet.</p>';
                        }
                        
                        var linkDisplay = source.link || 'No link';
                        
                        sourcesHtml += '<div class="source-section" data-source-index="' + s + '">';
                        sourcesHtml += '<div class="source-header">';
                        sourcesHtml += '<span class="source-label">' + sourceLabel + '</span>';
                        sourcesHtml += '</div>';
                        sourcesHtml += '<div class="source-content">';
                        sourcesHtml += '<div class="source-row">';
                        sourcesHtml += '<span class="source-field-label">Link</span>';
                        sourcesHtml += '<a href="' + linkDisplay + '" class="source-link" target="_blank">' + linkDisplay + '</a>';
                        sourcesHtml += '</div>';
                        sourcesHtml += '<div class="source-row count-row">';
                        sourcesHtml += '<span class="source-field-label">Reliability Score</span>';
                        sourcesHtml += '<div class="count-control">';
                        sourcesHtml += '<button onclick="updateReliabilityScore(\'' + claim.id + '\', \'' + sourceId + '\', -1, ' + source.isInitial + ')" class="count-btn">-</button>';
                        sourcesHtml += '<span class="source-count" id="score-' + sourceId + '">' + (source.reliabilityScore || '0') + '</span>';
                        sourcesHtml += '<button onclick="updateReliabilityScore(\'' + claim.id + '\', \'' + sourceId + '\', 1, ' + source.isInitial + ')" class="count-btn">+</button>';
                        sourcesHtml += '</div>';
                        sourcesHtml += '</div>';
                        sourcesHtml += '<div class="comment-section">';
                        sourcesHtml += '<div class="comment-header">';
                        sourcesHtml += '<span class="comment-label">Comment section by source</span>';
                        sourcesHtml += '</div>';
                        sourcesHtml += '<div class="comments">';
                        sourcesHtml += commentsHtml;
                        sourcesHtml += '</div>';
                        sourcesHtml += '<div class="add-comment">';
                        sourcesHtml += '<input type="text" class="comment-input" placeholder="Add comment" id="comment-input-' + sourceId + '">';
                        sourcesHtml += '<button onclick="addComment(\'' + claim.id + '\', \'' + sourceId + '\', ' + source.isInitial + ')" class="add-comment-btn">Add comment</button>';
                        sourcesHtml += '</div>';
                        sourcesHtml += '</div>';
                        sourcesHtml += '</div>';
                        sourcesHtml += '</div>';
                    }
                }

                container.innerHTML = '<div class="claim-detail">' +
                    '<div class="claim-header">' +
                        '<h1 class="claim-title">' + escapeHtml(claim.claim || claim.text || 'No claim text') + '</h1>' +
                    '</div>' +
                    '<div class="claim-meta">' +
                        '<span class="meta-item">Created: ' + new Date(claim.createdAt).toLocaleString() + '</span>' +
                        (claim.updatedAt && claim.updatedAt !== claim.createdAt ? 
                            '<span class="meta-item">Updated: ' + new Date(claim.updatedAt).toLocaleString() + '</span>' : ''
                        ) +
                    '</div>' +
                    '<div class="sources-container">' +
                        '<h2 class="sources-title">Sources</h2>' +
                        (sourcesHtml || '<p class="no-sources-text">No sources added yet.</p>') +
                    '</div>' +
                    '<div class="add-source-section-bottom">' +
                        '<a href="addSource.html?id=' + claim.id + '" class="add-source-btn-bottom">Add Source</a>' +
                    '</div>' +
                '</div>';
            }

            function updateReliabilityScore(claimId, sourceId, change, isInitial) {
                try {
                    var newValue = 0;
                    
                    if (isInitial) {
                        var claim = getClaimById(claimId);
                        if (!claim) return;
                        
                        var currentValue = parseInt(claim.reliabilityScore) || 0;
                        newValue = currentValue + change;
                        
                        if (newValue < 0) newValue = 0;
                        if (newValue > 1) newValue = 1;
                        
                        updateClaim(claimId, { reliabilityScore: newValue.toString() });
                    } else {
                        var sources = getSourcesForClaim(claimId);
                        var source = null;
                        for (var i = 0; i < sources.length; i++) {
                            if (sources[i].id === sourceId) {
                                source = sources[i];
                                break;
                            }
                        }
                        if (!source) return;
                        
                        var currentValue = parseInt(source.reliabilityScore) || 0;
                        newValue = currentValue + change;
                        
                        if (newValue < 0) newValue = 0;
                        if (newValue > 1) newValue = 1;
                        
                        source.reliabilityScore = newValue.toString();
                        updateSource(sourceId, { reliabilityScore: newValue.toString() });
                    }
                    
                    var countElement = document.getElementById('score-' + sourceId);
                    if (countElement) {
                        countElement.textContent = newValue;
                    }
                } catch (error) {
                    console.error('Error updating reliability score:', error);
                    alert('Error updating reliability score.');
                }
            }

            function addComment(claimId, sourceId, isInitial) {
                var input = document.getElementById('comment-input-' + sourceId);
                var text = input.value.trim();
                
                if (!text) {
                    alert('Please enter a comment.');
                    return;
                }

                try {
                    if (isInitial) {
                        var claim = getClaimById(claimId);
                        if (!claim) return;
                        
                        var comments = claim.comments || [];
                        comments.push(text);
                        updateClaim(claimId, { comments: comments });
                    } else {
                        addCommentToStorage(claimId, sourceId, text);
                    }
                    
                    input.value = '';
                    loadClaim(claimId);
                } catch (error) {
                    console.error('Error adding comment:', error);
                    alert('Error adding comment.');
                }
            }

            function deleteComment(commentId, isInitial) {
                if (!confirm('Delete this comment?')) {
                    return;
                }

                try {
                    if (isInitial) {
                        var claim = getClaimById(claimId);
                        if (!claim) return;
                        
                        var comments = claim.comments || [];
                        var newComments = [];
                        for (var i = 0; i < comments.length; i++) {
                            if (comments[i] !== commentId && comments[i].id !== commentId) {
                                newComments.push(comments[i]);
                            }
                        }
                        updateClaim(claimId, { comments: newComments });
                    } else {
                        deleteCommentFromStorage(commentId);
                    }
                    
                    loadClaim(claimId);
                } catch (error) {
                    console.error('Error deleting comment:', error);
                    alert('Error deleting comment.');
                }
            }

            function escapeHtml(text) {
                if (!text) return '';
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        </script>
    </body>
</html>
