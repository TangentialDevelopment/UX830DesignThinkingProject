<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Search Results - Verifact</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/index.css">
        <link rel="stylesheet" href="../css/searchResults.css">
    </head>
    <body>
        <div class="container">
            <div class="search-header">
                <form id="searchForm" class="search-form">
                    <input type="text" id="searchInput" placeholder="Search Here" class="search-input">
                    <button type="submit" class="search-btn">Search</button>
                </form>
            </div>

            <div id="loadingIndicator" class="loading" style="display: none;">
                <span>Loading claims...</span>
            </div>
            
            <div id="claimsList" class="claims-list"></div>

            <div class="add-claim-fixed">
                <a href="../pages/addClaim.html" class="add-claim-btn">
                    Add Claim
                </a>
            </div>
        </div>

        <script src="../js/storage.js"></script>
        <script>
            var urlParams = new URLSearchParams(window.location.search);
            var initialQuery = urlParams.get('q') || '';
            
            var currentQuery = initialQuery;

            if (initialQuery) {
                document.getElementById('searchInput').value = initialQuery;
            }

            document.addEventListener('DOMContentLoaded', function() {
                loadClaims();
            });

            document.getElementById('searchForm').addEventListener('submit', function(e) {
                e.preventDefault();
                performSearch();
            });

            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });

            function loadClaims() {
                var loadingIndicator = document.getElementById('loadingIndicator');
                loadingIndicator.style.display = 'block';
                
                setTimeout(function() {
                    var claims = getClaims();
                    loadingIndicator.style.display = 'none';
                    
                    if (currentQuery) {
                        var filtered = searchClaims(currentQuery);
                        displayClaims(filtered);
                    } else {
                        displayClaims(claims);
                    }
                }, 300);
            }

            function performSearch() {
                var query = document.getElementById('searchInput').value.trim();
                currentQuery = query;
                
                var newUrl = query ? 
                    window.location.pathname + '?q=' + encodeURIComponent(query) : 
                    window.location.pathname;
                window.history.pushState({ path: newUrl }, '', newUrl);
                
                loadClaims();
            }

            function displayClaims(claims) {
                var container = document.getElementById('claimsList');
                
                if (!claims || claims.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No claims found</p><p class="hint">Try adjusting your search terms or <a href="../pages/addClaim.html">add a new claim</a></p></div>';
                    return;
                }
                
                var html = '';
                for (var i = 0; i < claims.length; i++) {
                    var claim = claims[i];
                    html += '<div class="claim-card" data-id="' + claim.id + '" onclick="viewClaim(\'' + claim.id + '\')">';
                    html += '<div class="claim-row">';
                    html += '<div class="claim-title">';
                    html += '<span class="fact-label">Fact</span>';
                    html += '<span class="fact-text">' + escapeHtml(claim.claim || claim.text || 'No claim text') + '</span>';
                    html += '</div>';
                    html += '<div class="claim-source">';
                    html += '<span class="source-label">Source</span>';
                    html += '<span class="source-text">' + (claim.source || 'No source') + '</span>';
                    html += '</div>';
                    html += '<div class="claim-actions">';
                    html += '<button onclick="event.stopPropagation(); editClaim(\'' + claim.id + '\')" class="action-btn edit-btn">Edit</button>';
                    html += '<button onclick="event.stopPropagation(); deleteClaim(\'' + claim.id + '\')" class="action-btn delete-btn">Delete</button>';
                    html += '</div>';
                    html += '</div>';
                    html += '<div id="edit-form-' + claim.id + '" class="edit-form" style="display: none;" onclick="event.stopPropagation();">';
                    html += '<textarea id="edit-input-' + claim.id + '" rows="2">' + escapeHtml(claim.claim || claim.text || '') + '</textarea>';
                    html += '<input type="text" id="edit-source-' + claim.id + '" value="' + escapeHtml(claim.source || '') + '" placeholder="Source" class="edit-source-input">';
                    html += '<div class="edit-actions">';
                    html += '<button onclick="saveEdit(\'' + claim.id + '\')" class="save-btn">Save</button>';
                    html += '<button onclick="cancelEdit(\'' + claim.id + '\')" class="cancel-btn">Cancel</button>';
                    html += '</div>';
                    html += '</div>';
                    html += '</div>';
                }
                container.innerHTML = html;
            }

            function viewClaim(id) {
                window.location.href = 'claimDetail.html?id=' + id;
            }

            window.editClaim = function(id) {
                event.stopPropagation();
                document.getElementById('edit-form-' + id).style.display = 'block';
                document.getElementById('edit-input-' + id).focus();
            }

            window.cancelEdit = function(id) {
                event.stopPropagation();
                document.getElementById('edit-form-' + id).style.display = 'none';
            }

            window.saveEdit = function(id) {
                event.stopPropagation();
                var input = document.getElementById('edit-input-' + id);
                var sourceInput = document.getElementById('edit-source-' + id);
                var newText = input.value.trim();
                var newSource = sourceInput.value.trim();
                
                if (!newText) {
                    alert('Claim cannot be empty');
                    return;
                }

                try {
                    updateClaim(id, {
                        claim: newText,
                        text: newText,
                        source: newSource
                    });
                    
                    document.getElementById('edit-form-' + id).style.display = 'none';
                    loadClaims();
                } catch (error) {
                    console.error('Error updating claim:', error);
                    alert('Error updating claim. Please try again.');
                }
            }

            window.deleteClaim = function(id) {
                event.stopPropagation();
                if (!confirm('Are you sure you want to delete this claim?')) {
                    return;
                }

                try {
                    deleteClaim(id);
                    loadClaims();
                } catch (error) {
                    console.error('Error deleting claim:', error);
                    alert('Error deleting claim. Please try again.');
                }
            }

            function escapeHtml(text) {
                if (!text) return '';
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        </script>
    </body>
</html>
