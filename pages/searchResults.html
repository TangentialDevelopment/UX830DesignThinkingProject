<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Search Results - Verifact</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/searchResults.css">
        
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    </head>
    <body>
        <div class="container">
            <div class="search-header">
                <form id="searchForm" class="search-form">
                    <input type="text" id="searchInput" placeholder="Search Here" class="search-input">
                    <button type="submit" class="search-btn">Search</button>
                </form>
            </div>

            <div id="loadingIndicator" class="loading" style="display: none;">
                <span>Loading claims...</span>
            </div>
            
            <div id="claimsList" class="claims-list"></div>

            <div class="add-claim-fixed">
                <a href="../pages/addClaim.html" class="add-claim-btn">
                    Add Claim
                </a>
            </div>
        </div>

        <script src="../js/firebase-config.js"></script>
        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const initialQuery = urlParams.get('q') || '';
            
            let currentQuery = initialQuery;
            let allClaims = [];
            let unsubscribe = null;

            if (initialQuery) {
                document.getElementById('searchInput').value = initialQuery;
            }

            document.addEventListener('DOMContentLoaded', function() {
                setupRealtimeListener();
            });

            document.getElementById('searchForm').addEventListener('submit', function(e) {
                e.preventDefault();
                performSearch();
            });

            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });

            function setupRealtimeListener() {
                const loadingIndicator = document.getElementById('loadingIndicator');
                loadingIndicator.style.display = 'block';
                
                if (unsubscribe) {
                    unsubscribe();
                }
                
                unsubscribe = db.collection('claims')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot((snapshot) => {
                        loadingIndicator.style.display = 'none';
                        
                        allClaims = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        
                        if (currentQuery) {
                            const filtered = filterClaims(allClaims, currentQuery);
                            displayClaims(filtered);
                        } else {
                            displayClaims(allClaims);
                        }
                    }, (error) => {
                        loadingIndicator.style.display = 'none';
                        console.error('Error listening to claims:', error);
                        document.getElementById('claimsList').innerHTML = 
                            '<p class="error">Error loading claims. Please refresh the page.</p>';
                    });
            }

            function filterClaims(claims, query) {
                const q = query.toLowerCase();
                return claims.filter(claim => {
                    const claimMatch = claim.claim?.toLowerCase().includes(q) || false;
                    const textMatch = claim.text?.toLowerCase().includes(q) || false;
                    const sourceMatch = claim.source?.toLowerCase().includes(q) || false;
                    return claimMatch || textMatch || sourceMatch;
                });
            }

            function performSearch() {
                const query = document.getElementById('searchInput').value.trim();
                currentQuery = query;
                
                const newUrl = query ? 
                    `${window.location.pathname}?q=${encodeURIComponent(query)}` : 
                    window.location.pathname;
                window.history.pushState({ path: newUrl }, '', newUrl);
                
                if (query) {
                    const filtered = filterClaims(allClaims, query);
                    displayClaims(filtered);
                } else {
                    displayClaims(allClaims);
                }
            }

            function displayClaims(claims) {
                const container = document.getElementById('claimsList');
                
                if (claims.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>No claims found</p>
                            <p class="hint">Try adjusting your search terms or <a href="../pages/addClaim.html">add a new claim</a></p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = claims.map(claim => `
                    <div class="claim-card" data-id="${claim.id}" onclick="viewClaim('${claim.id}')">
                        <div class="claim-row">
                            <div class="claim-title">
                                <span class="fact-label">Fact</span>
                                <span class="fact-text">${escapeHtml(claim.claim || claim.text || 'No claim text')}</span>
                            </div>
                            <div class="claim-source">
                                <span class="source-label">Source</span>
                                <span class="source-text">${claim.source || 'No source'}</span>
                            </div>
                            <div class="claim-actions">
                                <button onclick="event.stopPropagation(); editClaim('${claim.id}')" class="action-btn edit-btn">Edit</button>
                                <button onclick="event.stopPropagation(); deleteClaim('${claim.id}')" class="action-btn delete-btn">Delete</button>
                            </div>
                        </div>
                        <div id="edit-form-${claim.id}" class="edit-form" style="display: none;" onclick="event.stopPropagation();">
                            <textarea id="edit-input-${claim.id}" rows="2">${escapeHtml(claim.claim || claim.text || '')}</textarea>
                            <input type="text" id="edit-source-${claim.id}" value="${escapeHtml(claim.source || '')}" placeholder="Source" class="edit-source-input">
                            <div class="edit-actions">
                                <button onclick="saveEdit('${claim.id}')" class="save-btn">Save</button>
                                <button onclick="cancelEdit('${claim.id}')" class="cancel-btn">Cancel</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            function viewClaim(id) {
                window.location.href = `claimDetail.html?id=${id}`;
            }

            window.editClaim = function(id) {
                event.stopPropagation();
                document.getElementById(`edit-form-${id}`).style.display = 'block';
                document.getElementById(`edit-input-${id}`).focus();
            }

            window.cancelEdit = function(id) {
                event.stopPropagation();
                document.getElementById(`edit-form-${id}`).style.display = 'none';
            }

            window.saveEdit = async function(id) {
                event.stopPropagation();
                const input = document.getElementById(`edit-input-${id}`);
                const sourceInput = document.getElementById(`edit-source-${id}`);
                const newText = input.value.trim();
                const newSource = sourceInput.value.trim();
                
                if (!newText) {
                    alert('Claim cannot be empty');
                    return;
                }

                try {
                    const updateData = {
                        claim: newText,
                        text: `${newText}\n\nSource: ${newSource}`,
                        updatedAt: new Date().toISOString()
                    };
                    
                    if (newSource) {
                        updateData.source = newSource;
                    }
                    
                    await db.collection('claims').doc(id).update(updateData);
                    
                    document.getElementById(`edit-form-${id}`).style.display = 'none';
                } catch (error) {
                    console.error('Error updating claim:', error);
                    alert('Error updating claim. Please try again.');
                }
            }

            window.deleteClaim = async function(id) {
                event.stopPropagation();
                if (!confirm('Are you sure you want to delete this claim?')) {
                    return;
                }

                try {
                    await db.collection('claims').doc(id).delete();
                } catch (error) {
                    console.error('Error deleting claim:', error);
                    alert('Error deleting claim. Please try again.');
                }
            }

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            window.addEventListener('beforeunload', function() {
                if (unsubscribe) {
                    unsubscribe();
                }
            });
        </script>
    </body>
</html>
