<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Add Claim - Verifact</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/index.css">
        <link rel="stylesheet" href="../css/addClaim.css">
    </head>
    <body>
        <div class="container">
            <div class="top-bar">
                <a href="../index.html" class="back-btn">
                    Back
                </a>
            </div>

            <h1 class="page-title">Add Claim</h1>

            <div class="input-section">
                <label class="input-label">Claim & Fact</label>
                <textarea id="claimInput" placeholder="Enter your claim and supporting fact here..." rows="4"></textarea>
            </div>

            <div class="input-section">
                <label class="input-label">Source</label>
                <input type="text" id="sourceInput" placeholder="Enter source URL or reference..." class="text-input">
            </div>

            <div class="submit-section">
                <button id="submitBtn" class="submit-btn">
                    Submit Claim
                </button>
            </div>

            <div id="message" class="message"></div>
        </div>

        <script src="../js/storage.js"></script>
        <script>
            var claimInput = document.getElementById('claimInput');
            var sourceInput = document.getElementById('sourceInput');
            var message = document.getElementById('message');
            var submitBtn = document.getElementById('submitBtn');

            function addClaim() {
                var claim = claimInput.value.trim();
                var source = sourceInput.value.trim();
                
                message.innerHTML = '';
                
                if (!claim) {
                    message.innerHTML = '<span class="error">Please enter a claim and fact.</span>';
                    return;
                }

                if (!source) {
                    message.innerHTML = '<span class="error">Please enter a source.</span>';
                    return;
                }

                try {
                    var claimData = {
                        claim: claim,
                        text: claim,
                        source: source
                    };
                    
                    var newClaim = window.saveClaimToStorage(claimData);
                    
                    message.innerHTML = '<span class="success">Claim added successfully!</span>';
                    
                    claimInput.value = '';
                    sourceInput.value = '';
                    
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Adding...';
                    
                    setTimeout(function() {
                        window.location.href = '../index.html';
                    }, 1500);
                } catch (error) {
                    console.error('Error adding claim:', error);
                    message.innerHTML = '<span class="error">Error adding claim. Please try again.</span>';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Claim';
                }
            }

            submitBtn.addEventListener('click', addClaim);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    addClaim();
                }
            });

            claimInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sourceInput.focus();
                }
            });

            sourceInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addClaim();
                }
            });

            claimInput.focus();
        </script>
    </body>
</html>
