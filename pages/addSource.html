<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Add Source - Verifact</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/index.css">
        <link rel="stylesheet" href="../css/addSource.css">
    </head>
    <body>
        <div class="container">
            <div class="top-bar">
                <a href="javascript:history.back()" class="back-btn">
                    Back
                </a>
            </div>

            <h1 class="page-title">Add Source</h1>

            <div class="form-container">
                <div class="input-section">
                    <label class="input-label">Add link</label>
                    <input type="text" id="sourceLink" placeholder="Enter source URL..." class="text-input">
                </div>

                <div class="submit-section">
                    <button id="submitBtn" class="submit-btn">
                        Add Source
                    </button>
                </div>

                <div id="message" class="message"></div>
            </div>
        </div>

        <script src="../js/storage.js"></script>
        <script>
            var urlParams = new URLSearchParams(window.location.search);
            var claimId = urlParams.get('id');
            var linkInput = document.getElementById('sourceLink');
            var message = document.getElementById('message');
            var submitBtn = document.getElementById('submitBtn');

            document.addEventListener('DOMContentLoaded', function() {
                if (!claimId) {
                    message.innerHTML = '<span class="error">No claim ID provided.</span>';
                }
                linkInput.focus();
            });

            function addSourceToClaim() {
                var link = linkInput.value.trim();
                
                message.innerHTML = '';
                
                if (!link) {
                    message.innerHTML = '<span class="error">Please enter a source link.</span>';
                    return;
                }

                if (!claimId) {
                    message.innerHTML = '<span class="error">No claim ID provided.</span>';
                    return;
                }

                try {
                    var claim = getClaimById(claimId);
                    
                    if (!claim) {
                        message.innerHTML = '<span class="error">Claim not found.</span>';
                        return;
                    }
                    
                    saveSourceToStorage(claimId, link);
                    
                    message.innerHTML = '<span class="success">Source added successfully!</span>';
                    linkInput.value = '';
                    
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Adding...';
                    
                    setTimeout(function() {
                        window.location.href = 'claimDetail.html?id=' + claimId;
                    }, 1500);
                } catch (error) {
                    console.error('Error adding source:', error);
                    message.innerHTML = '<span class="error">Error adding source. Please try again.</span>';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Add Source';
                }
            }

            submitBtn.addEventListener('click', addSourceToClaim);

            linkInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addSourceToClaim();
                }
            });
        </script>
    </body>
</html>
